<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluwall CRM - Seguimiento</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente para Iconos (Adaptación para Navegador)
        const Icon = ({ name, size = 16, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [clientes, setClientes] = useState([
                { id: 1, nombre: "Juan Pérez", telf: "555-0123", empresa: "Logística Norte", proximoSeguimiento: new Date().toISOString().split('T')[0], nota: "Interesado en muros de tablaroca.", tipo: "Contratista - Prospecto", etapa: "Contacto Inicial" },
                { id: 2, nombre: "Arq. Maria S.", telf: "555-9876", empresa: "Diseño Urbano", proximoSeguimiento: "2024-05-20", nota: "Pidió presupuesto para 100m2 de plafón.", tipo: "Arquitecto - Prospecto", etapa: "Presupuesto" },
            ]);
            
            const [nuevoCliente, setNuevoCliente] = useState({ nombre: '', telf: '', nota: '', tipo: 'Prospecto - Pendiente' });
            const [isRecording, setIsRecording] = useState(false);
            const etapas = ["Contacto Inicial", "Presupuesto", "Negociación", "Cierre / Seguimiento"];

            const calcularFechaSeguimiento = (fechaInicio = new Date(), diasAAñadir = 3) => {
                let fecha = new Date(fechaInicio);
                let diasContados = 0;
                while (diasContados < diasAAñadir) {
                    fecha.setDate(fecha.getDate() + 1);
                    if (fecha.getDay() !== 0) diasContados++;
                }
                if (fecha.getDay() === 0) fecha.setDate(fecha.getDate() + 1);
                return fecha.toISOString().split('T')[0];
            };

            const toggleListening = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) return alert("Navegador no compatible con voz");
                const recognition = new SR();
                recognition.lang = 'es-ES';
                recognition.onstart = () => setIsRecording(true);
                recognition.onend = () => setIsRecording(false);
                recognition.onresult = (e) => {
                    const text = e.results[0][0].transcript;
                    setNuevoCliente(prev => ({ ...prev, nota: text, tipo: "Analizando perfil..." }));
                    // Aquí iría tu fetch a Gemini API si tienes la Key configurada
                    setTimeout(() => {
                        setNuevoCliente(prev => ({ ...prev, tipo: "Contratista - Prospecto" }));
                    }, 1500);
                };
                recognition.start();
            };

            const agregarCliente = () => {
                if (!nuevoCliente.nombre) return;
                const nuevo = { ...nuevoCliente, id: Date.now(), proximoSeguimiento: calcularFechaSeguimiento(), etapa: "Contacto Inicial" };
                setClientes([...clientes, nuevo]);
                setNuevoCliente({ nombre: '', telf: '', nota: '', tipo: 'Prospecto - Pendiente' });
            };

            const completarGestion = (id) => {
                setClientes(prev => prev.map(c => c.id === id ? { ...c, proximoSeguimiento: calcularFechaSeguimiento() } : c));
            };

            const hoy = new Date().toISOString().split('T')[0];
            const seguimientosHoy = clientes.filter(c => c.proximoSeguimiento <= hoy);

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 font-sans">
                    <nav className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                    <Icon name="brain-circuit" size={20} />
                                </div>
                                <h1 className="text-xl font-bold text-blue-900 tracking-tight">Bluwall CRM</h1>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                <button onClick={() => setView('dashboard')} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'dashboard' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>
                                    <Icon name="layout-dashboard" size={16} /> Hoy
                                </button>
                                <button onClick={() => setView('pipeline')} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'pipeline' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>
                                    <Icon name="trello" size={16} /> Pipeline
                                </button>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] uppercase font-black text-slate-400">Jornada L-S</p>
                            <p className="text-sm font-bold text-slate-600">{new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric' })}</p>
                        </div>
                    </nav>

                    <div className="p-8">
                        {view === 'dashboard' ? (
                            <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800">Seguimiento Diario</h2>
                                            <p className="text-slate-500 text-sm italic">Acciones prioritarias</p>
                                        </div>
                                        <div className="bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 flex items-center gap-3">
                                            <span className="text-3xl font-black text-blue-600">{seguimientosHoy.length}</span>
                                            <span className="text-[10px] leading-tight text-blue-400 font-bold uppercase">Gestiones<br/>Pendientes</span>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {seguimientosHoy.map(c => (
                                            <div key={c.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-6">
                                                <div className={`w-1.5 h-12 rounded-full ${new Date(c.proximoSeguimiento) < new Date(hoy) ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                                                <div className="flex-1">
                                                    <h3 className="font-bold text-lg">{c.nombre} <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded ml-2">{c.tipo}</span></h3>
                                                    <p className="text-sm text-slate-500 italic">"{c.nota}"</p>
                                                </div>
                                                <button onClick={() => completarGestion(c.id)} className="bg-blue-600 text-white p-4 rounded-2xl shadow-lg shadow-blue-100">
                                                    <Icon name="check-circle" size={24} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 h-fit">
                                    <h3 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="plus-circle" className="text-blue-600"/> Nuevo Registro</h3>
                                    <div className="space-y-4">
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="Nombre" value={nuevoCliente.nombre} onChange={e => setNuevoCliente({...nuevoCliente, nombre: e.target.value})} />
                                        <input className="w-full p-4 bg-slate-50 rounded-2xl outline-none" placeholder="WhatsApp" value={nuevoCliente.telf} onChange={e => setNuevoCliente({...nuevoCliente, telf: e.target.value})} />
                                        <div className="relative">
                                            <textarea className="w-full p-4 bg-slate-50 rounded-2xl outline-none h-32 text-sm" placeholder="Detalles del prospecto..." value={nuevoCliente.nota} onChange={e => setNuevoCliente({...nuevoCliente, nota: e.target.value})} />
                                            <button onClick={toggleListening} className={`absolute bottom-4 right-4 p-3 rounded-full ${isRecording ? 'bg-red-500 animate-pulse' : 'bg-blue-600'} text-white shadow-lg`}>
                                                <Icon name={isRecording ? "mic-off" : "mic"} size={20} />
                                            </button>
                                        </div>
                                        <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Categorización Automática</p>
                                            <p className="text-sm font-bold text-blue-800">{nuevoCliente.tipo}</p>
                                        </div>
                                        <button onClick={agregarCliente} disabled={!nuevoCliente.nombre} className="w-full bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-blue-800 disabled:opacity-50">
                                            Registrar e Iniciar Ciclo
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 h-[70vh]">
                                {etapas.map(etapa => (
                                    <div key={etapa} className="bg-slate-200/50 rounded-[32px] p-4 flex flex-col h-full overflow-hidden">
                                        <h3 className="font-black text-slate-600 uppercase text-xs tracking-widest mb-4 px-2">{etapa}</h3>
                                        <div className="space-y-3 overflow-y-auto custom-scrollbar">
                                            {clientes.filter(c => c.etapa === etapa).map(c => (
                                                <div key={c.id} className="bg-white p-4 rounded-2xl shadow-sm border border-white hover:border-blue-100 transition-all">
                                                    <p className="font-bold text-slate-800 text-sm">{c.nombre}</p>
                                                    <p className="text-[10px] text-slate-500 mt-1 line-clamp-2 italic">"{c.nota}"</p>
                                                    <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-50 text-[10px] font-bold text-blue-600">
                                                        <span>{c.telf}</span>
                                                        <Icon name="clock" size={10} className="text-slate-400"/>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
